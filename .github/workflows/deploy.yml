name: Deploy to GitHub Pages

on:
  # Run on every push to main…
  push:
    branches: [main]
  # …and let you re-run a deploy manually from the Actions tab.
  workflow_dispatch:

# Permissions needed by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time. Don't cancel an in-progress deploy
# (it can leave the live site in a half-published state); just queue the next.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astro-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astro-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Astro emits the static site to astro-site/dist with CNAME baked in
          # (from astro-site/public/CNAME).
          path: astro-site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
